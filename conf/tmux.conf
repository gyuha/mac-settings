# Tmux Configuration
# Generated with TmuxAI Config Generator
# https://tmuxai.dev
#
# -- Basic Settings ------------------------------------------

# === Prefix 변경 (Ctrl+Space, Ctrl+b도 유지) ===
set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix

# === 기본 설정 ===
set -g escape-time 500                       # 키 시퀀스 인식 대기 시간을 500ms로 설정
set -g history-limit 10000                    # 스크롤백 히스토리 라인 수를 10000으로 설정
set -g base-index 1                          # 윈도우 번호 시작값을 1로 설정
setw -g pane-base-index 1                    # pane 번호 시작값을 1로 설정

set -g mouse on                             # 마우스 지원 활성화
setw -g mode-keys vi

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g automatic-rename off
set -g allow-passthrough on

# === Pane 설정 ===
set -g pane-border-format " #{pane_index} #{pane_current_command} "
set -g pane-border-status top
# set -g pane-border-lines double

# === 복사 모드 (vi) ===
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "pbcopy"

# yazi 파일 탐색기 (Prefix + Tab: 50% 분할)
bind Tab split-window -h -l 50% -c "#{pane_current_path}" "yazi"

# -- Status Bar ---------------------------------------------
bind | split-window -h -c "#{pane_current_path}"  # 수평분할 키 바인딩
bind - split-window -v -c "#{pane_current_path}"  # 수직분할 키 바인딩

# 윈도우 탭 (현재 선택 윈도우 강조)
set -g @catppuccin_window_text " #I:#{=10:window_name} "
set -g @catppuccin_window_current_text " #[bold] *#I:#W* "

# 마우스 스크롤 속도 (기본 3 → 5줄씩)
bind-key -T copy-mode-vi WheelUpPane send-keys -X -N 5 scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X -N 5 scroll-down


# -- Window move --------------------------------------------
bind -n M-Left select-pane -L               # 왼쪽 창으로 이동
bind -n M-Right select-pane -R              # 오른쪽 창으로 이동
bind -n M-Up select-pane -U                 # 위쪽 창으로 이동
bind -n M-Down select-pane -D               # 아래쪽 창으로 이동

bind r source-file ~/.tmux.conf \; display "Reloaded!"

# bind x kill-pane                            # prefix + x: 확인 없이 현재 pane 즉시 닫기
# bind & kill-window                          # prefix + &: 확인 없이 현재 window 즉시 닫기

set-window-option -g mode-keys vi           # vim 키 바인딩

# === 플러그인 ===
# Plugin manager
set -g @plugin 'tmux-plugins/tpm'            # TPM 플러그인 매니저 로드

# Other plugins
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'christoomey/vim-tmux-navigator' # vim-tmux 간 창 이동 연동
# set -g @plugin 'tmux-plugins/tmux-cpu'       # CPU 플로그인
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-resurrect' # 세션 저장/복원 플러그인
set -g @plugin 'tmux-plugins/tmux-sensible'  # 기본 sane 설정 플러그인
set -g @plugin 'tmux-plugins/tmux-yank'      # tmux 복사 버퍼 yank 지원

# === Theme ===
# set -g @plugin 'odedlaz/tmux-onedark-theme'  # OneDark 테마 적용

# Catppuccin 테마 
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# -- Status Bar ---------------------------------------------
# 상태 바 오른쪽: 디렉토리 + Git 브랜치 + CPU + 메모리 + 배터리 + 시간
set -g status-right-length 150
set -g status-left-length 150
set -g status-left "#[bg=default] #[fg=#bac2de,bg=default] #W "
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#[bg=default] #[fg=#a6e3a1,bg=#313244]  #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null || echo '-') "
set -ag status-right "#[fg=#f5e0dc,bg=default] #[fg=#11111b,bg=#f5e0dc]#(uname -s | sed -e 's/^Darwin$//' -e 's/^Linux$//' -e 's/^CYGWIN.*/󰍲/' -e 's/^MINGW.*/󰍲/' -e 's/^MSYS.*/󰍲/' -e 't' -e 's/.*//') #[fg=#cdd6f4,bg=#585b70] #(hostname -s) #[fg=#585b70,bg=default]"
# set -ag status-right "#[bg=default] #[fg=#f5c2e7,bg=#313244] #{battery_icon} #{battery_percentage} "

#
# Initialize TMUX plugin manager
# Keep this line at the very bottom of tmux.conf
run '~/.tmux/plugins/tpm/tpm'                # TPM 초기화 실행 (반드시 마지막 줄)
