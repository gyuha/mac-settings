# Tmux Configuration
# Generated with TmuxAI Config Generator
# https://tmuxai.dev
#
# -- Basic Settings ------------------------------------------

# === Prefix 변경 (Ctrl+Space, Ctrl+b도 유지) ===
set -g prefix C-Space                      # 기본 prefix 키를 Ctrl+Space로 변경
set -g prefix2 C-b                         # 기존 Ctrl+b도 보조 prefix로 유지
bind C-Space send-prefix                   # Ctrl+Space 입력 자체를 애플리케이션으로 전달할 수 있게 함

# === 기본 설정 ===
set -g escape-time 500                     # 키 시퀀스 인식 대기 시간을 500ms로 설정
set -g history-limit 10000                 # 스크롤백 히스토리 라인 수를 10000으로 설정
set -g base-index 1                        # 윈도우 번호 시작값을 1로 설정
setw -g pane-base-index 1                  # pane 번호 시작값을 1로 설정

set -g mouse on                            # 마우스 지원 활성화
setw -g mode-keys vi                       # 선택/스크롤 등 기본 모드 키를 vi 스타일로 사용

set -g default-terminal "tmux-256color"    # tmux 내부 TERM 값을 256색 지원 터미널로 설정
set -ag terminal-overrides ",xterm-256color:RGB" # truecolor(RGB) 출력을 사용할 수 있게 보강
set -g automatic-rename off                # 프로그램 이름에 따라 윈도우 이름이 자동 변경되지 않게 함
set -g allow-passthrough on                # 지원되는 escape sequence를 터미널로 그대로 전달

# === Pane 설정 ===
set -g pane-border-format "#[fg=#f5e0dc,bg=default]#[fg=#11111b,bg=#f5e0dc]#{pane_index}#[fg=#f5e0dc,bg=#585b70]#[fg=#cdd6f4,bg=#585b70] #{pane_current_command} #[fg=#585b70,bg=default]" # pane 테두리에 번호와 현재 명령 표시
set -g pane-border-status top              # pane 정보 표시줄을 상단 테두리에 배치
# set -g pane-border-lines double

# === 복사 모드 (vi) ===
setw -g mode-keys vi                       # copy-mode에서도 vi 키 바인딩을 사용
bind-key -T copy-mode-vi v send-keys -X begin-selection # v로 시각 선택 시작
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy" # y로 선택 내용을 macOS 클립보드에 복사 후 종료
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy" # Enter로도 복사 후 copy-mode 종료
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "pbcopy" # 마우스 드래그 선택을 클립보드로 복사

# yazi 파일 탐색기 (Prefix + Tab: 50% 분할)
bind Tab split-window -h -l 50% -c "#{pane_current_path}" "yazi" # 현재 경로 기준으로 오른쪽 50% 크기의 yazi pane 열기
bind g split-window -h -l 50% -c "#{pane_current_path}" "lazygit" # 현재 경로 기준으로 오른쪽 50% 크기의 lazygit 열기

# -- Status Bar ---------------------------------------------
bind | split-window -h -c "#{pane_current_path}"  # 수평분할 키 바인딩
bind - split-window -v -c "#{pane_current_path}"  # 수직분할 키 바인딩

# 윈도우 탭 (현재 선택 윈도우 강조)
set -g @catppuccin_window_text " #I:#{=10:window_name} " # 비활성 윈도우 탭에 번호와 이름 표시
set -g @catppuccin_window_current_text " #[bold] *#I:#W* " # 활성 윈도우 탭은 굵게 강조

# 마우스 스크롤 속도 (기본 3 → 5줄씩)
bind-key -T copy-mode-vi WheelUpPane send-keys -X -N 5 scroll-up   # copy-mode에서 휠 업 시 5줄 위로 스크롤
bind-key -T copy-mode-vi WheelDownPane send-keys -X -N 5 scroll-down # copy-mode에서 휠 다운 시 5줄 아래로 스크롤


# -- Window move --------------------------------------------
bind -n M-Left select-pane -L               # 왼쪽 창으로 이동
bind -n M-Right select-pane -R              # 오른쪽 창으로 이동
bind -n M-Up select-pane -U                 # 위쪽 창으로 이동
bind -n M-Down select-pane -D               # 아래쪽 창으로 이동

bind r source-file ~/.tmux.conf \; display "Reloaded!" # prefix+r로 설정 파일을 다시 읽고 완료 메시지 표시

# bind x kill-pane                            # prefix + x: 확인 없이 현재 pane 즉시 닫기
# bind & kill-window                          # prefix + &: 확인 없이 현재 window 즉시 닫기

set-window-option -g mode-keys vi           # vim 키 바인딩

# === 플러그인 ===
# Plugin manager
set -g @plugin 'tmux-plugins/tpm'            # TPM 플러그인 매니저 로드

# Other plugins
set -g @plugin 'catppuccin/tmux'            # Catppuccin 테마 플러그인 로드
set -g @plugin 'christoomey/vim-tmux-navigator' # vim-tmux 간 창 이동 연동
set -g @plugin 'tmux-plugins/tmux-continuum' # tmux-resurrect와 연계해 세션 자동 저장
set -g @plugin 'tmux-plugins/tmux-resurrect' # 세션 저장/복원 플러그인
set -g @plugin 'tmux-plugins/tmux-sensible'  # 기본 sane 설정 플러그인
set -g @plugin 'tmux-plugins/tmux-yank'      # tmux 복사 버퍼 yank 지원

# === Theme ===

# Catppuccin 테마 
set -g @catppuccin_flavor "mocha"          # Catppuccin의 mocha 팔레트를 사용
set -g @catppuccin_window_status_style "rounded" # 윈도우 탭 모양을 둥근 스타일로 표시

# -- Status Bar ---------------------------------------------
# 상태 바 왼쪽: 현재 윈도우 이름 / 오른쪽: 디렉토리 + Git 브랜치 + OS 아이콘 + 호스트명
set -g status-right-length 150             # 오른쪽 상태줄 최대 길이를 150칸으로 설정
set -g status-left-length 150              # 왼쪽 상태줄 최대 길이를 150칸으로 설정
set -g status-left "#[bg=default] #[fg=#bac2de,bg=default] #{session_name} " # 왼쪽 상태줄에 현재 tmux 윈도우 이름 표시
set -g status-right "#{E:@catppuccin_status_directory}" # 오른쪽 상태줄 첫 세그먼트로 현재 디렉토리 표시
set -ag status-right "#[bg=default] #[fg=#a6e3a1,bg=#313244]  #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null || echo '-') " # 현재 pane 경로 기준 Git 브랜치 이름 표시
set -ag status-right "#[fg=#f5e0dc,bg=default] #[fg=#11111b,bg=#f5e0dc]#(uname -s | sed -e 's/^Darwin$//' -e 's/^Linux$//' -e 's/^CYGWIN.*/󰍲/' -e 's/^MINGW.*/󰍲/' -e 's/^MSYS.*/󰍲/' -e 't' -e 's/.*//') #[fg=#f5e0dc,bg=#585b70]#[fg=#cdd6f4,bg=#585b70] #(hostname -s) #[fg=#585b70,bg=default]" # OS 아이콘과 hostname을 배지 형태 세그먼트로 표시
# set -ag status-right "#[bg=default] #[fg=#f5c2e7,bg=#313244] #{battery_icon} #{battery_percentage} "

#
# Initialize TMUX plugin manager
# Keep this line at the very bottom of tmux.conf
run '~/.tmux/plugins/tpm/tpm'                # TPM 초기화 실행 (반드시 마지막 줄)
